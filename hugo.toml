baseURL = "https://emb-ed.github.io/"
languageCode = "en-us"
title = "The Cost of Conversion"
theme = "PaperMod"
paginate = 5
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  author = "Jishnu"
  DateFormat = "January 2, 2006"
  defaultTheme = "dark"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  UseHugoToc = true
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = "The Cost of Conversion"
    Content = "On systems, thresholds, and what gets lost in between."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/emb-ed"

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = true
    lineNumbersInTable = true

[menu]
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "Archives"
    url = "/archives/"
    weight = 2
  [[menu.main]]
    name = "Search"
    url = "/search/"
    weight = 3
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 4